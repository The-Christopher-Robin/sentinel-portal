AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SentinelPortal chat API on AWS Lambda + API Gateway

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 25
    MemorySize: 1024
    Architectures: [arm64]
    Tracing: Active
    Environment:
      Variables:
        NODE_OPTIONS: "--enable-source-maps"

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
  DatabaseUrl:
    Type: String
    NoEcho: true
  TranscriptBucket:
    Type: String
    Default: sentinel-portal-transcripts

Resources:
  ChatApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'OPTIONS,POST,GET'"
        AllowHeaders: "'Content-Type,Authorization'"

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../api/
      Handler: dist/lambda.handler
      Events:
        ApiAny:
          Type: Api
          Properties:
            RestApiId: !Ref ChatApi
            Path: /{proxy+}
            Method: ANY
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKey
          DATABASE_URL: !Ref DatabaseUrl
          S3_TRANSCRIPT_BUCKET: !Ref TranscriptBucket
          AWS_LOG_GROUP: !Sub "/sentinel/chat-api-${AWS::StackName}"
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref TranscriptBucket
        - CloudWatchLogsFullAccess

  TranscriptBucketResource:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref TranscriptBucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

Outputs:
  ChatApiUrl:
    Description: Invoke URL for the chat API
    Value: !Sub "https://${ChatApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
