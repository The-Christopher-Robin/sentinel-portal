name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --no-audit --no-fund
      - run: npm -w web run typecheck
      - run: npm -w web run build
        env:
          AUTH_SECRET: ci-placeholder-secret-not-used-in-prod
          NEXT_PUBLIC_SANITY_PROJECT_ID: your-project-id

  api:
    name: api typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --no-audit --no-fund
      - run: npm -w api run typecheck
      - run: npm -w api run test
